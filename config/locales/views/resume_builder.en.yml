      roles:
        software_engineer:
          variants:
            early_career:
              highlights:
                - "Built and shipped product or internal tools with close guidance from senior engineers, documenting decisions and testing changes before release."
                - "Debugged issues across Rails, JavaScript, or API workflows and partnered with teammates to unblock customers or internal users quickly."
                - "Contributed code reviews, implementation notes, or QA support that helped the team deliver reliable features on schedule."
            growth_stage:
              highlights:
                - "Led end-to-end delivery for product or platform work, coordinating requirements, implementation, release readiness, and follow-up improvements."
                - "Improved reliability, developer experience, or team velocity by refining architecture, test coverage, and operational workflows."
                - "Partnered across product, design, and support to scope technical tradeoffs and deliver customer-facing work with measurable impact."
        product_manager:
          variants:
            early_career:
              highlights:
                - "Supported roadmap planning by gathering customer and stakeholder feedback, clarifying requirements, and keeping delivery details organized across teams."
                - "Turned ambiguous requests into tickets, briefs, or experiment plans that helped design and engineering move forward with clearer priorities."
                - "Tracked launches or iteration work after release, capturing outcomes and feeding the next set of product decisions back into planning."
            growth_stage:
              highlights:
                - "Owned roadmap priorities for a defined product area, balancing customer insight, business goals, and delivery constraints across cross-functional teams."
                - "Led discovery, launch planning, and post-release follow-through for initiatives that improved adoption, retention, or operational efficiency."
                - "Aligned stakeholders around product tradeoffs by using clear metrics, documented decisions, and structured communication across design and engineering."
        product_designer:
          variants:
            early_career:
              highlights:
                - "Created flows, wireframes, or polished UI states that translated user feedback into clearer product decisions and implementation-ready assets."
                - "Worked with product and engineering to refine usability issues, document edge cases, and keep shipped experiences consistent across screens."
                - "Supported research synthesis, design QA, or systems cleanup that improved clarity and reduced avoidable UX friction."
            growth_stage:
              highlights:
                - "Shaped end-to-end product experiences from discovery through shipped UI, balancing customer insight, visual clarity, and technical constraints."
                - "Improved consistency across workflows by strengthening design system usage, reusable patterns, and handoff quality with engineering partners."
                - "Used research findings, prototype testing, or post-launch feedback to prioritize improvements and strengthen core user journeys."
        data_analyst:
          variants:
            early_career:
              highlights:
                - "Built recurring reports or dashboards that turned raw operational data into clear weekly insights for cross-functional stakeholders."
                - "Cleaned, validated, or joined data from multiple sources so teams could make decisions with more confidence and less manual effort."
                - "Helped explain trends, anomalies, or experiment results in plain language that supported planning and follow-up action."
            growth_stage:
              highlights:
                - "Owned trusted reporting layers and dashboards that gave teams faster visibility into performance, pipeline health, or customer behavior."
                - "Partnered with stakeholders to define useful metrics, investigate operational questions, and turn data findings into prioritized action."
                - "Improved analysis quality by tightening SQL logic, documentation, and data validation practices across recurring reporting workflows."
        customer_success_manager:
          variants:
            early_career:
              highlights:
                - "Managed onboarding or renewal workflows by coordinating customer needs, internal follow-up, and timely communication across teams."
                - "Resolved account issues quickly by triaging blockers, clarifying next steps, and keeping customers informed until handoff or resolution."
                - "Captured feedback from calls, tickets, or account reviews and turned it into actionable product or process follow-up for internal partners."
        project_manager:
          variants:
            growth_stage:
              highlights:
                - "Coordinated cross-functional timelines, owners, and dependencies so projects moved forward with clearer accountability and fewer surprises."
                - "Improved reporting and planning rhythms by tightening meeting structure, status updates, and escalation paths for delivery risks."
                - "Kept stakeholders aligned through organized documentation, milestone tracking, and proactive follow-through on open decisions."
        internship:
          variants:
            early_career:
              highlights:
                - "Supported day-to-day team execution through research, coordination, documentation, or production work that contributed to real deliverables."
                - "Learned new tools quickly and applied feedback from supervisors to improve work quality, turnaround time, and handoff clarity."
                - "Took ownership of scoped tasks or mini-projects that helped the team move work forward while building practical professional experience."
        teaching_assistant:
          variants:
            student_support:
              highlights:
                - "Led review sessions, office hours, or small-group support that helped students understand course material and stay on track."
                - "Clarified assignments, graded work consistently, or coordinated with instructors to keep course operations organized and responsive."
                - "Explained complex topics in approachable language and adapted support based on recurring questions or student needs."
        tutor:
          variants:
            student_support:
              highlights:
                - "Provided one-on-one or small-group tutoring that improved student confidence, comprehension, and follow-through on assignments."
                - "Planned lessons or practice sessions around specific gaps so learners could make measurable progress over time."
                - "Built trust with students and families through reliable communication, preparation, and tailored academic support."
        volunteer_experience:
          variants:
            community:
              highlights:
                - "Coordinated volunteer, event, or outreach work that improved service delivery and kept community-facing activities running smoothly."
                - "Took ownership of scheduling, communication, or logistics that helped a nonprofit, campus group, or community program serve people more effectively."
                - "Worked with staff or peers to solve day-to-day problems, represent the organization well, and keep commitments dependable."
