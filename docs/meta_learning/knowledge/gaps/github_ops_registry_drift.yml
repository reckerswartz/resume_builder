impact: >
  `docs/github_ops/registry.yml` can drift away from the live GitHub issue
  inventory for workflow-labeled issues, which weakens roadmap summaries,
  historical aggregation, and any automation that depends on central issue
  counts being trustworthy.
recommended_automation:
  type: registry_observability
  actions:
    - "Monitor `docs/github_ops/registry.yml` workflow summaries against live GitHub issues grouped by `workflow:*` labels."
    - "Reconcile `docs/github_ops/registry.yml` summary counts, issue arrays, and sync timestamps from live workflow-labeled GitHub issue state."
    - "Write back exact, unambiguous workflow-local `github_issue` references when live workflow-labeled issues already carry stable local tracking keys."
    - "Flag registry-linked issue references that no longer exist or no longer carry the expected workflow label."
    - "Create or close a single durable GitHub alert issue when drift appears or is reconciled."
