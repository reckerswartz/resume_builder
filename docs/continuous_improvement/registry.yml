  - id: "CI-WORKSPACE-007"
    category: productivity_boost
    impact: high
    effort: medium
    status: validated
    implemented_at: "2026-03-23T02:43:08Z"
    user_personas:
      - power_user
    journey_step: "Use bulk actions across a paginated high-volume workspace"
    problem: >
      The workspace bulk-action bar only tracks checked boxes from the
      current page render. In a 112-resume workspace, selecting a resume
      on page 1 and then moving to page 2 resets the summary back to
      `0 resumes selected` and disables the bulk action buttons. This
      makes bulk export and delete effectively page-local, so a power
      user cannot build a cross-page selection set without manually
      processing each page in isolation.
    proposed_improvement: >
      Persist workspace bulk-selection state across pagination (and, if
      practical, search/sort changes) so a power user can build a
      multi-page selection set before exporting or deleting. A small,
      Rails-native approach could store selected resume IDs in hidden
      fields or session-backed state and let the Stimulus controller
      hydrate the current page checkboxes plus a global selection
      summary. Add a clear-selection affordance so the cross-page state
      stays understandable.
    evidence:
      page_url: "/resumes?page=2"
      resume_count: 112
      page_1_selection_summary: "1 resume selected"
      after_pagination_summary: "0 resumes selected"
      action_state_after_pagination: "Export selected and Delete selected disabled"
    affected_files:
      - "app/views/resumes/index.html.erb"
      - "app/views/resumes/_resume_card.html.erb"
      - "app/javascript/controllers/workspace_bulk_actions_controller.js"
      - "app/controllers/resumes_controller.rb"
      - "config/locales/views/resumes.en.yml"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"
      - "spec/system/workspace_bulk_actions_spec.rb"

