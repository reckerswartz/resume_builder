proposals:
  - id: "CI-BUILDER-001"
    category: remove_friction
    impact: high
    effort: small
    status: validated
    implemented_at: "2026-03-22T04:43:00Z"
    user_personas:
      - new_user
      - returning_user
    journey_step: "Start new resume → land on source step"
    problem: >
      After creating a resume, ResumesController#create redirects to
      edit_resume_path(@resume, step: 'source'). For users starting from
      scratch (no existing resume to import), the source step is a forced
      detour that adds no value — they must click 'Next' to skip past
      paste/upload fields before reaching the heading step where actual
      content editing begins.
    proposed_improvement: >
      Detect the resume's source_mode at creation time. When the user
      chose 'scratch' or did not provide source content, redirect
      directly to step: 'heading' instead of step: 'source'. Keep the
      source step accessible from the builder sidebar for users who
      want to import content later.
    evidence:
      page_url: "/resumes/new"
      redirect_target: "/resumes/:id/edit?step=source"
      interaction_count: "1 extra click to skip source step"
    affected_files:
      - "app/controllers/resumes_controller.rb"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-AUTH-001"
    category: improve_content
    impact: medium
    effort: small
    status: validated
    implemented_at: "2026-03-22T04:47:00Z"
    user_personas:
      - new_user
    journey_step: "Visit sign-in page as first-time visitor"
    problem: >
      The sign-in page at /session/new shows 'Welcome back' eyebrow and
      'Pick up where you left off' heading. When a first-time visitor
      clicks 'Sign in' from the homepage or gets redirected from a
      protected route, this returning-user copy creates a false
      assumption that the visitor already has an account.
    proposed_improvement: >
      Change the sign-in page copy to be neutral rather than
      returning-user specific. Use copy like 'Sign in to your workspace'
      that works for both new and returning visitors. Keep the 'Need an
      account? Create one' link prominent.
    evidence:
      page_url: "/session/new"
      current_copy: "Welcome back / Pick up where you left off"
    affected_files:
      - "config/locales/views/sessions.en.yml"
      - "app/views/sessions/new.html.erb"
    estimated_spec_paths:
      - "spec/requests/sessions_spec.rb"

  - id: "CI-TEMPLATE-001"
    category: new_feature
    impact: medium
    effort: medium
    status: validated
    implemented_at: "2026-03-22T05:20:00Z"
    github_issue: 65
    user_personas:
      - new_user
    journey_step: "Browse templates before creating account"
    problem: >
      Unauthenticated users cannot browse the template gallery. Visiting
      /templates redirects to sign-in. This means potential users cannot
      see what layout options are available before committing to account
      creation, reducing conversion confidence.
    proposed_improvement: >
      Allow guest access to templates#index and templates#show by
      updating TemplatePolicy#index? and #show? to return true for all
      visitors (or add allow_unauthenticated_access to
      TemplatesController). The 'Use this template' CTA can redirect
      guests to registration with the template_id preserved.
    evidence:
      page_url: "/templates"
      redirect_target: "/session/new"
    affected_files:
      - "app/policies/template_policy.rb"
      - "app/controllers/templates_controller.rb"
    estimated_spec_paths:
      - "spec/requests/templates_spec.rb"

  - id: "CI-WORKSPACE-001"
    category: improve_content
    impact: high
    effort: medium
    status: validated
    implemented_at: "2026-03-22T05:10:00Z"
    github_issue: 59
    user_personas:
      - new_user
    journey_step: "Land on workspace after first registration"
    problem: >
      After creating an account, the user lands on the workspace with
      their starter resume but no welcome message, onboarding guidance,
      or first-action prompt. The workspace looks identical whether the
      user has been using the app for months or just signed up seconds
      ago. There is no contextual help explaining what the starter
      resume is or what to do next.
    proposed_improvement: >
      Add a first-visit welcome card or banner on the workspace that
      appears only when the user has exactly 1 resume and it was
      created within the last few minutes (or track a 'welcomed' flag).
      The card should explain 'Your starter draft is ready — click Edit
      to start building' with a direct link to the builder.
    evidence:
      page_url: "/resumes"
      interaction_count: "0 contextual guidance for new users"
    affected_files:
      - "app/views/resumes/index.html.erb"
      - "app/helpers/resumes_helper.rb"
      - "config/locales/views/resumes.en.yml"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-EDIT-001"
    category: remove_friction
    impact: high
    effort: small
    status: implemented
    implemented_at: "2026-03-22T05:35:00Z"
    user_personas:
      - returning_user
      - power_user
    journey_step: "Click Edit on workspace card → always lands on heading step"
    problem: >
      When a returning user clicks Edit on a workspace resume card, the builder
      always defaults to the heading step because StepRegistry.fetch falls back
      to 'heading' when no step param is provided. For a resume with 100%
      completion (5/5 tracked steps done), this is a forced detour — the user
      likely wants to fine-tune a specific section or go straight to finalize
      and export. Landing on heading every time wastes a click and breaks the
      returning-user mental model of 'pick up where I left off'.
    proposed_improvement: >
      Add a smart default step method to the controller or Flow presenter.
      When all tracked steps are complete, default to finalize. Otherwise,
      default to the first incomplete tracked step. The workspace Edit link
      can remain as /resumes/:id/edit (no step param) — the controller or
      presenter resolves the smart default server-side.
    evidence:
      page_url: "/resumes"
      edit_link: "/resumes/14/edit"
      landing_step: "heading (always)"
      interaction_count: "1 extra click to navigate away from heading to desired step"
    affected_files:
      - "app/presenters/resume_builder/flow.rb"
      - "app/presenters/resume_builder/step_catalog.rb"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"
      - "spec/presenters/resume_builder/editor_state_spec.rb"

  - id: "CI-WORKSPACE-002"
    category: new_feature
    impact: high
    effort: medium
    status: validated
    implemented_at: "2026-03-22T05:50:00Z"
    user_personas:
      - returning_user
      - power_user
    journey_step: "View workspace cards — no duplicate action available"
    problem: >
      The workspace resume card actions are Edit, Preview, and Delete.
      There is no way to duplicate an existing resume. A returning user
      who wants to create a tailored version for a different job application
      must start from scratch via /resumes/new and re-enter all content
      manually. This is a significant productivity gap for users with
      multiple job targets.
    proposed_improvement: >
      Add a 'Duplicate' action to the workspace resume card alongside
      Edit/Preview/Delete. The action should POST to a new
      ResumesController#duplicate endpoint that deep-copies the resume
      (title with 'Copy of' prefix, same template, sections, entries,
      settings, contact details, and summary) and redirects to the
      new resume's edit page. Section/entry positions should be preserved.
    evidence:
      page_url: "/resumes"
      available_actions: "Edit, Preview, Delete"
      missing_action: "Duplicate"
    affected_files:
      - "app/controllers/resumes_controller.rb"
      - "app/views/resumes/_resume_card.html.erb"
      - "app/services/resumes/duplicator.rb"
      - "config/routes.rb"
      - "config/locales/views/resumes.en.yml"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-WORKSPACE-003"
    category: remove_friction
    impact: medium
    effort: small
    status: implemented
    implemented_at: "2026-03-22T05:45:00Z"
    user_personas:
      - returning_user
      - power_user
    journey_step: "View workspace cards — no quick export action"
    problem: >
      To export or download a resume, a returning user must navigate
      through the builder to the finalize step or the preview page.
      There is no quick export or download action on the workspace
      resume card. For a resume that is already 100% complete and
      'ready to review', this adds 2-3 unnecessary clicks to the
      most common returning-user task: re-downloading an updated PDF.
    proposed_improvement: >
      Add a 'Download' quick action to the workspace resume card
      that links directly to /resumes/:id/download_text or triggers
      export. For resumes with an existing PDF export, show
      'Download PDF' linking to /resumes/:id/download. For resumes
      without an export, show 'Export PDF' as a form button that
      POSTs to /resumes/:id/export.
    evidence:
      page_url: "/resumes"
      available_actions: "Edit, Preview, Delete"
      missing_action: "Quick export/download"
      extra_clicks: "2-3 clicks to reach export from workspace"
    affected_files:
      - "app/views/resumes/_resume_card.html.erb"
      - "config/locales/views/resumes.en.yml"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-TEMPLATE-002"
    category: new_feature
    impact: medium
    effort: medium
    status: implemented
    implemented_at: "2026-03-22T06:00:00Z"
    user_personas:
      - returning_user
      - power_user
    journey_step: "Browse templates marketplace — Use template always creates new resume"
    problem: >
      The templates marketplace 'Use template' CTA links to
      /resumes/new?template_id=N, which always creates a new resume.
      A returning user who wants to switch their existing resume's
      template must navigate to the builder finalize step and use the
      inline template picker. There is no way to apply a marketplace
      template to an existing resume directly from the marketplace,
      even though the finalize step already supports template switching.
    proposed_improvement: >
      When a signed-in user is browsing the marketplace and has existing
      resumes, show an 'Apply to existing resume' option alongside the
      current 'Use template' CTA. This could be a dropdown or secondary
      link that lists the user's existing resumes and redirects to
      /resumes/:id/edit?step=finalize&template_id=N, triggering the
      existing template-switch autosave flow.
    evidence:
      page_url: "/templates"
      use_template_url: "/resumes/new?template_id=3"
      missing_flow: "Apply template to existing resume from marketplace"
    affected_files:
      - "app/views/templates/index.html.erb"
      - "app/views/templates/_template_card.html.erb"
      - "app/views/templates/show.html.erb"
      - "app/presenters/templates/marketplace_state.rb"
    estimated_spec_paths:
      - "spec/requests/templates_spec.rb"
      - "spec/presenters/templates/marketplace_state_spec.rb"

  - id: "CI-PREVIEW-001"
    category: remove_friction
    impact: medium
    effort: small
    status: implemented
    implemented_at: "2026-03-22T05:35:00Z"
    user_personas:
      - returning_user
    journey_step: "View preview page — Edit resume always links to heading step"
    problem: >
      From the preview page, the 'Edit resume' link always points to
      /resumes/:id/edit?step=heading regardless of context. A returning
      user who spots a typo in their experience section while reviewing
      the preview must click 'Edit resume', land on heading, then
      navigate to experience — adding 2 unnecessary clicks. The preview
      page already renders all resume sections with clear headings.
    proposed_improvement: >
      Change the preview page 'Edit resume' link to use the smart
      default step (same logic as CI-EDIT-001). Additionally, consider
      making section headings in the preview clickable, linking directly
      to the corresponding builder step (e.g., clicking 'Experience'
      heading → /resumes/:id/edit?step=experience). This would make
      the preview page a true review-and-edit hub.
    evidence:
      page_url: "/resumes/14"
      edit_link: "/resumes/14/edit?step=heading"
      expected_link: "/resumes/14/edit?step=finalize (when all steps complete)"
    affected_files:
      - "app/views/resumes/show.html.erb"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-NAV-001"
    category: remove_friction
    impact: medium
    effort: small
    status: validated
    implemented_at: "2026-03-22T04:57:00Z"
    github_issue: 58
    user_personas:
      - new_user
      - returning_user
    journey_step: "Navigate from homepage to resume creation"
    problem: >
      The public homepage has a 'Create account' CTA but the three
      'Start here' cards ('Start from scratch', 'Bring an existing
      resume', 'Keep the preview in view') are informational but not
      clickable — they describe features without linking to the
      corresponding actions.
    proposed_improvement: >
      Make the three 'Start here' cards on the homepage clickable,
      linking to registration/new with appropriate query parameters
      (e.g., source_mode=scratch, source_mode=import). This turns
      passive feature descriptions into active conversion paths.
    evidence:
      page_url: "/"
      current_behavior: "Cards are read-only informational blocks"
    affected_files:
      - "app/views/home/index.html.erb"
      - "config/locales/en.yml"
    estimated_spec_paths:
      - "spec/requests/home_spec.rb"

  - id: "CI-WORKSPACE-004"
    category: remove_friction
    impact: critical
    effort: small
    status: discovered
    user_personas:
      - power_user
    journey_step: "View workspace with 112 resumes — all rendered on single page"
    problem: >
      The workspace renders every resume card on a single page with no
      pagination. A power user with 112 resumes sees a page that is
      thousands of pixels tall, loads slowly, and makes it impossible
      to find a specific resume without browser search. The controller
      uses policy_scope(Resume).order(updated_at: :desc) with no limit
      or pagination.
    proposed_improvement: >
      Add cursor-based or offset pagination to the workspace index.
      Show 12-20 resume cards per page with prev/next navigation.
      Use Turbo Frames for seamless page transitions. Keep the
      existing sort (updated_at desc) as the default.
    evidence:
      page_url: "/resumes"
      resume_count: 112
      page_height: "massive — all 112 cards rendered at once"
    affected_files:
      - "app/controllers/resumes_controller.rb"
      - "app/views/resumes/index.html.erb"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-WORKSPACE-005"
    category: productivity_boost
    impact: high
    effort: medium
    status: discovered
    user_personas:
      - power_user
    journey_step: "View workspace with many resumes — no search or filter"
    problem: >
      The workspace has no search or filter capability. A power user
      with many resumes cannot search by title, headline, template,
      or status. They must scroll through all cards visually or use
      browser Ctrl+F. The templates marketplace already has a rich
      search/filter system that could be adapted.
    proposed_improvement: >
      Add a search field to the workspace header that filters resumes
      by title or headline (server-side query). Optionally add a
      template filter dropdown to narrow by layout family. Keep it
      lightweight — a single search input is the minimum viable
      improvement.
    evidence:
      page_url: "/resumes"
      resume_count: 112
      missing_feature: "search/filter"
    affected_files:
      - "app/controllers/resumes_controller.rb"
      - "app/views/resumes/index.html.erb"
      - "config/locales/views/resumes.en.yml"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-WORKSPACE-006"
    category: productivity_boost
    impact: medium
    effort: small
    status: discovered
    user_personas:
      - power_user
    journey_step: "View workspace — resumes always sorted by updated_at desc"
    problem: >
      The workspace always sorts resumes by updated_at descending.
      A power user may want to sort by title, template, or creation
      date. The templates marketplace already supports sort options
      that could serve as a pattern.
    proposed_improvement: >
      Add a sort dropdown to the workspace header with options like
      'Recently updated' (default), 'Name A-Z', 'Template', and
      'Oldest first'. Wire through a sort query param to the
      controller.
    evidence:
      page_url: "/resumes"
      current_sort: "updated_at desc (hardcoded)"
      missing_feature: "sort options"
    affected_files:
      - "app/controllers/resumes_controller.rb"
      - "app/views/resumes/index.html.erb"
      - "config/locales/views/resumes.en.yml"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"

  - id: "CI-EXPORT-001"
    category: productivity_boost
    impact: medium
    effort: medium
    status: discovered
    user_personas:
      - power_user
    journey_step: "View workspace — no bulk export capability"
    problem: >
      A power user who maintains multiple resumes for different job
      targets cannot select and export several resumes at once. Each
      resume must be exported individually by navigating to its
      preview or finalize step. With many resumes, this is a
      significant time cost.
    proposed_improvement: >
      Add checkbox selection to workspace resume cards with a bulk
      action bar that supports 'Export selected as PDF' and
      'Delete selected'. Use Stimulus for client-side selection state
      and a single POST endpoint for bulk operations.
    evidence:
      page_url: "/resumes"
      resume_count: 112
      missing_feature: "bulk actions"
    affected_files:
      - "app/controllers/resumes_controller.rb"
      - "app/views/resumes/index.html.erb"
      - "app/views/resumes/_resume_card.html.erb"
      - "config/routes.rb"
    estimated_spec_paths:
      - "spec/requests/resumes_spec.rb"
