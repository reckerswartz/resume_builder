  usability_issues: "/ux-usability-audit"
  responsive_issues: "/responsive-ui-audit"
  compliance_gaps: "/ui-guidelines-audit"
  code_quality: "/maintainability-audit"
  bugs: "/smart-fix"
  security: "/security-audit"
journey_definitions:
  new_user:
    description: "First-time visitor creating their first resume"
    steps:
      - "Visit homepage"
      - "Create account"
      - "Start new resume (setup step)"
      - "Choose template"
      - "Add heading/contact info"
      - "Add personal details"
      - "Add experience entries"
      - "Add education entries"
      - "Add skills"
      - "Write summary"
      - "Finalize and adjust formatting"
      - "Export PDF"
    success_criteria: "User completes a presentable resume and downloads a PDF in under 20 minutes"
  returning_user:
    description: "Signed-in user editing an existing resume"
    steps:
      - "Sign in"
      - "Open resume workspace"
      - "Select existing resume"
      - "Edit experience section"
      - "Preview changes"
      - "Export updated PDF"
    success_criteria: "User makes targeted edits and exports in under 5 minutes"
  power_user:
    description: "Managing multiple resumes with advanced features"
    steps:
      - "Sign in"
      - "Browse resume workspace"
      - "Compare templates in marketplace"
      - "Switch template on existing resume"
      - "Use cloud import"
      - "Fine-tune formatting in finalize"
      - "Export multiple formats"
    success_criteria: "User can efficiently manage multiple resumes and leverage advanced features"
  admin:
    description: "Managing platform configuration and monitoring"
    steps:
      - "Sign in as admin"
      - "Review admin dashboard"
      - "Manage templates"
      - "Configure LLM providers"
      - "Monitor job logs"
      - "Review error logs"
      - "Adjust platform settings"
    success_criteria: "Admin can monitor and configure the platform efficiently"
