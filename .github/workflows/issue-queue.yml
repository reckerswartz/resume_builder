name: Issue Queue Engine

on:
  issues:
    types: [opened, labeled]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Specific issue number to process (empty = pick from queue)"
        type: string
        default: ""
      dry_run:
        description: "Preview what would happen without making changes"
        type: boolean
        default: false

permissions:
  issues: write
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: issue-queue
  cancel-in-progress: false

jobs:
  pick_issue:
    name: "Pick Next Issue"
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.pick.outputs.issue_number }}
      issue_title: ${{ steps.pick.outputs.issue_title }}
      issue_labels: ${{ steps.pick.outputs.issue_labels }}
      branch_name: ${{ steps.pick.outputs.branch_name }}
      should_process: ${{ steps.pick.outputs.should_process }}
    steps:
      - name: Select issue from queue
        id: pick
        uses: actions/github-script@v9
        with:
          script: |
            const explicitNumber = '${{ github.event.inputs.issue_number }}';
            const dryRun = '${{ github.event.inputs.dry_run }}' === 'true';

            let issue = null;

            if (explicitNumber) {
              // ── Explicit issue selection ───────────────────────────
              const resp = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(explicitNumber, 10),
              });
              issue = resp.data;
            } else if (context.eventName === 'issues') {
              // ── Issue event trigger ────────────────────────────────
              issue = context.payload.issue;
              const labels = (issue.labels || []).map(l => l.name);
              if (!labels.includes('ci-auto') && !labels.includes('ui-audit') && !labels.includes('auto-fix')) {
                console.log('Issue does not have processable labels, skipping');
                core.setOutput('should_process', 'false');
                return;
              }
            } else {
              // ── Scheduled: pick highest priority open issue ────────
              const priorities = ['priority:critical', 'priority:high', 'priority:medium', 'ci-auto', 'ui-audit'];

              for (const label of priorities) {
                const resp = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: label,
                  state: 'open',
                  sort: 'created',
                  direction: 'asc',
                  per_page: 1,
                });

                // Skip issues already being worked on
                const candidates = resp.data.filter(i =>
                  !(i.labels || []).some(l => l.name === 'in-progress')
                );

                if (candidates.length > 0) {
                  issue = candidates[0];
                  break;
                }
              }

              if (!issue) {
                console.log('No issues in queue to process');
                core.setOutput('should_process', 'false');
                return;
              }
            }

            // Verify issue is not a pull request
            if (issue.pull_request) {
              console.log('Selected item is a PR, not an issue — skipping');
              core.setOutput('should_process', 'false');
              return;
            }

            // Check not already in progress
            const labels = (issue.labels || []).map(l => l.name);
            if (labels.includes('in-progress') && !explicitNumber) {
              console.log(`Issue #${issue.number} is already in progress, skipping`);
              core.setOutput('should_process', 'false');
              return;
            }

            const branchName = `auto-fix/${issue.number}-${issue.title
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .substring(0, 50)
              .replace(/-$/, '')}`;

            console.log(`Selected issue #${issue.number}: ${issue.title}`);
            console.log(`Branch: ${branchName}`);
            console.log(`Labels: ${labels.join(', ')}`);

            if (dryRun) {
              console.log('Dry run — would process this issue');
              core.setOutput('should_process', 'false');
              return;
            }

            core.setOutput('issue_number', issue.number.toString());
            core.setOutput('issue_title', issue.title);
            core.setOutput('issue_labels', JSON.stringify(labels));
            core.setOutput('branch_name', branchName);
            core.setOutput('should_process', 'true');

  process_issue:
    name: "Process Issue #${{ needs.pick_issue.outputs.issue_number }}"
    runs-on: ubuntu-latest
    needs: [pick_issue]
    if: needs.pick_issue.outputs.should_process == 'true'
    steps:
      - name: Mark issue as in-progress
        uses: actions/github-script@v9
        with:
          script: |
            const issueNumber = parseInt('${{ needs.pick_issue.outputs.issue_number }}', 10);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Processing started by workflow run [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            });

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create fix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.pick_issue.outputs.branch_name }}"
          git push origin "${{ needs.pick_issue.outputs.branch_name }}"

      - name: Dispatch fix workflow
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-fix.yml',
              ref: '${{ needs.pick_issue.outputs.branch_name }}',
              inputs: {
                issue_number: '${{ needs.pick_issue.outputs.issue_number }}',
                branch_name: '${{ needs.pick_issue.outputs.branch_name }}',
              },
            });
            console.log('Dispatched auto-fix workflow for issue #${{ needs.pick_issue.outputs.issue_number }}');
