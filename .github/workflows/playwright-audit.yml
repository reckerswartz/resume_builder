name: Playwright UI Audit

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "app/views/**"
      - "app/components/**"
      - "app/assets/**"
      - "app/javascript/**"
      - "app/helpers/**"
      - "app/presenters/**"
      - "config/locales/**"
  workflow_dispatch:
    inputs:
      pages:
        description: "Comma-separated page paths to audit (empty = all)"
        type: string
        default: ""
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: playwright-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/resume_builder_test
  CI: true

jobs:
  audit:
    name: "UI Audit · ${{ matrix.viewport.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        viewport:
          - { name: "mobile", width: 390, height: 844 }
          - { name: "tablet", width: 768, height: 1024 }
          - { name: "desktop", width: 1280, height: 800 }
          - { name: "wide", width: 1440, height: 900 }

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby

      - name: Set up Node + Yarn
        uses: ./.github/actions/setup-node

      - name: Build assets
        uses: ./.github/actions/build-assets

      - name: Setup database
        uses: ./.github/actions/setup-db

      - name: Seed audit data
        run: bin/rails db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Rails server in background
        run: |
          bundle exec rails server -p 3000 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/up > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:3000/up || (echo "::error::Rails server failed to start" && exit 1)
          echo "Rails server is ready"

      - name: Run Playwright page audit
        run: |
          node .github/scripts/playwright-audit.mjs \
            --base-url=http://localhost:3000 \
            --width=${{ matrix.viewport.width }} \
            --height=${{ matrix.viewport.height }} \
            --viewport-name="${{ matrix.viewport.name }}" \
            --output-dir=tmp/playwright-audit/${{ matrix.viewport.name }} \
            --pages="${{ github.event.inputs.pages || '' }}"
        env:
          AUDIT_CREDENTIALS: "demo@resume-builder.local:password123!"
          ADMIN_CREDENTIALS: "admin@resume-builder.local:password123!"

      - name: Stop Rails server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-audit-${{ matrix.viewport.name }}
          path: tmp/playwright-audit/${{ matrix.viewport.name }}/
          retention-days: 30

  summarize:
    name: "Summarize Audit Results"
    runs-on: ubuntu-latest
    needs: [audit]
    if: always()
    outputs:
      has_failures: ${{ steps.summarize.outputs.has_failures }}
      summary_json: ${{ steps.summarize.outputs.summary_json }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all audit artifacts
        uses: actions/download-artifact@v8
        with:
          path: tmp/playwright-results/
          pattern: playwright-audit-*

      - name: Generate consolidated summary
        id: summarize
        run: node .github/scripts/audit-summarize.mjs --input-dir=tmp/playwright-results/ --output=tmp/audit-summary.json

      - name: Upload consolidated summary
        uses: actions/upload-artifact@v4
        with:
          name: audit-summary
          path: tmp/audit-summary.json
          retention-days: 30

      - name: Comment audit results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'tmp/audit-summary.json';
            if (!fs.existsSync(path)) return;
            const s = JSON.parse(fs.readFileSync(path, 'utf8'));
            const icon = s.failed > 0 ? ':x:' : ':white_check_mark:';
            const lines = [
              `## ${icon} Playwright UI Audit`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Pages audited | ${s.total_pages} |`,
              `| Passed | ${s.passed} |`,
              `| Warnings | ${s.warnings} |`,
              `| Failed | ${s.failed} |`,
              `| Viewports | ${s.viewports.join(', ')} |`,
              '',
            ];
            if (s.failures && s.failures.length > 0) {
              lines.push('### Failures');
              lines.push('');
              for (const f of s.failures) {
                lines.push(`- **${f.page}** @ ${f.viewport}: ${f.reason}`);
              }
              lines.push('');
              lines.push('> Check workflow artifacts for screenshots and logs.');
            }
            const body = lines.join('\n');
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Playwright UI Audit')
            );
            const params = {
              owner: context.repo.owner, repo: context.repo.repo, body,
            };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
