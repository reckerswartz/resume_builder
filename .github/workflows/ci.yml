name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_suite:
        description: "Run full test suite including system specs"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/resume_builder_test
  CI: true

jobs:
  # ─── Security Scanning ───────────────────────────────────────────────
  scan_ruby:
    name: "Security · Ruby"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby

      - name: Scan for Rails security vulnerabilities (Brakeman)
        run: bin/brakeman --no-pager --format json --output tmp/brakeman-report.json || true

      - name: Brakeman human-readable output
        run: bin/brakeman --no-pager

      - name: Scan for known gem vulnerabilities (bundler-audit)
        run: bin/bundler-audit

      - name: Upload Brakeman report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: brakeman-report
          path: tmp/brakeman-report.json
          retention-days: 30

  scan_js:
    name: "Security · JavaScript"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby

      - name: Set up Node + Yarn
        uses: ./.github/actions/setup-node

      - name: Build assets
        uses: ./.github/actions/build-assets

      - name: Audit JavaScript dependencies
        run: yarn npm audit --all --recursive || true
        continue-on-error: true

  # ─── Linting ──────────────────────────────────────────────────────────
  lint:
    name: "Lint · RuboCop"
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  # ─── Test Suite ───────────────────────────────────────────────────────
  test:
    name: "Test · RSpec"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby

      - name: Set up Node + Yarn
        uses: ./.github/actions/setup-node

      - name: Build assets
        uses: ./.github/actions/build-assets

      - name: Setup database
        uses: ./.github/actions/setup-db

      - name: Run RSpec (unit + request + presenter + helper + service)
        run: |
          bundle exec rspec \
            --format progress \
            --format json --out tmp/rspec-results.json \
            --exclude-pattern "spec/system/**/*_spec.rb"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rspec-results
          path: |
            tmp/rspec-results.json
            coverage/
          retention-days: 30

  # ─── System Specs (on-demand or main branch) ─────────────────────────
  test_system:
    name: "Test · System Specs"
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main'
      || github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.labels.*.name, 'full-ci')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resume_builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Set up Ruby
        uses: ./.github/actions/setup-ruby

      - name: Set up Node + Yarn
        uses: ./.github/actions/setup-node

      - name: Build assets
        uses: ./.github/actions/build-assets

      - name: Setup database
        uses: ./.github/actions/setup-db

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Run system specs
        run: |
          bundle exec rspec spec/system/ \
            --format progress \
            --format json --out tmp/system-spec-results.json

      - name: Upload system spec artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: system-spec-results
          path: |
            tmp/system-spec-results.json
            tmp/capybara/
          retention-days: 30

  # ─── CI Gate ──────────────────────────────────────────────────────────
  ci_gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [scan_ruby, scan_js, lint, test]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [ "${{ needs.scan_ruby.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::CI gate failed — one or more required jobs did not pass."
            exit 1
          fi
          echo "All required CI jobs passed."
