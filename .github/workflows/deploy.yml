name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/continuous-audit.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - staging
          - production
        default: staging
      strategy:
        description: "Deployment strategy"
        type: choice
        options:
          - rolling
          - blue-green
          - canary
        default: rolling
      skip_validation:
        description: "Skip pre-deploy validation (emergency only)"
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  packages: write
  deployments: write

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Pre-Deploy Validation ───────────────────────────────────────────
  pre_deploy:
    name: "Pre-Deploy Validation"
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_validation != 'true'
    outputs:
      ci_status: ${{ steps.check.outputs.ci_status }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Verify CI passed on this commit
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.sha;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              status: 'completed',
              per_page: 10,
            });

            const ciRun = runs.data.workflow_runs.find(r => r.name === 'CI');
            if (ciRun && ciRun.conclusion === 'success') {
              core.setOutput('ci_status', 'passed');
              console.log(`CI passed for ${sha.substring(0, 7)}`);
            } else {
              core.setOutput('ci_status', 'unknown');
              console.log(`CI status unknown for ${sha.substring(0, 7)} — proceeding with caution`);
            }

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          TAG="${{ github.event.inputs.environment || 'staging' }}-${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

  # ─── Build Docker Image ──────────────────────────────────────────────
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: [pre_deploy]
    if: always() && (needs.pre_deploy.result == 'success' || needs.pre_deploy.result == 'skipped')
    outputs:
      image_tag: ${{ needs.pre_deploy.outputs.image_tag || steps.fallback_tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fallback image tag
        id: fallback_tag
        if: needs.pre_deploy.outputs.image_tag == ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          TAG="staging-${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.pre_deploy.outputs.image_tag || steps.fallback_tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Staging ───────────────────────────────────────────────
  deploy_staging:
    name: "Deploy · Staging"
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.inputs.environment != 'production'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL || 'https://staging.resume-builder.local' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.build.outputs.image_tag }} to staging"
          echo "Strategy: ${{ github.event.inputs.strategy || 'rolling' }}"
          # Kamal deployment would go here:
          # bin/kamal deploy --destination=staging
          echo "Staging deployment placeholder — configure Kamal destination for real deploys"

      - name: Verify staging health
        run: |
          echo "Verifying staging health..."
          # curl -sf "${{ vars.STAGING_URL }}/up" || exit 1
          echo "Health check placeholder — configure STAGING_URL secret"

  # ─── Deploy to Production ────────────────────────────────────────────
  deploy_production:
    name: "Deploy · Production"
    runs-on: ubuntu-latest
    needs: [build, deploy_staging]
    if: >-
      github.event.inputs.environment == 'production'
      || (github.ref == 'refs/heads/main' && needs.deploy_staging.result == 'success')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://resume-builder.local' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to production
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'rolling' }}"
          echo "Deploying ${{ needs.build.outputs.image_tag }} to production"
          echo "Strategy: $STRATEGY"

          case "$STRATEGY" in
            blue-green)
              echo "Blue-green deploy: spinning up new environment, switching traffic, tearing down old"
              # bin/kamal deploy --destination=production
              ;;
            canary)
              echo "Canary deploy: routing 10% traffic to new version, monitoring, then full rollout"
              # bin/kamal deploy --destination=production --canary
              ;;
            rolling)
              echo "Rolling deploy: updating instances one at a time"
              # bin/kamal deploy --destination=production
              ;;
          esac
          echo "Production deployment placeholder — configure Kamal for real deploys"

      - name: Verify production health
        run: |
          echo "Verifying production health..."
          # curl -sf "${{ vars.PRODUCTION_URL }}/up" || exit 1
          echo "Health check placeholder — configure PRODUCTION_URL secret"

      - name: Post-deploy notification
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const success = '${{ job.status }}' === 'success' || '${{ job.status }}' === 'Success';
            const icon = success ? ':rocket:' : ':rotating_light:';
            const status = success ? 'succeeded' : 'failed';
            console.log(`${icon} Production deploy ${status} for ${{ needs.build.outputs.image_tag }}`);

  # ─── Auto-Rollback on Failure ────────────────────────────────────────
  rollback:
    name: "Rollback on Failure"
    runs-on: ubuntu-latest
    needs: [deploy_production]
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trigger rollback
        run: |
          echo "Production deploy failed — triggering rollback"
          # bin/kamal rollback --destination=production
          echo "Rollback placeholder — configure Kamal for real rollbacks"

      - name: Create rollback issue
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Deploy] Production rollback triggered for ${context.sha.substring(0, 7)}`,
              body: [
                '## Production Deployment Failure',
                '',
                `**Commit:** ${context.sha}`,
                `**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                'An automatic rollback was triggered. Please investigate the deployment failure.',
              ].join('\n'),
              labels: ['deploy', 'priority:critical'],
            });
