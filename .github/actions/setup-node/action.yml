name: "Setup Node + Yarn"
description: "Install Node.js with Yarn 4 via corepack and dependency cache"

inputs:
  node-version:
    description: "Node.js version"
    required: false
    default: "22"

runs:
  using: "composite"
  steps:
    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "yarn"

    - name: Install JavaScript dependencies
      shell: bash
      run: yarn install --immutable
